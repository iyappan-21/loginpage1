<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
</head>
<style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: stretch;
    }
    .wrap{
        display: grid;
        grid-template-columns: 1fr 1fr;
        width: 100%;
        min-height: 100vh;
    }
    .left {
      background: #000000;
      display: grid;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 3rem;
      position: relative;
      overflow: hidden;
    }

    .welcome{
        background-color: rgb(0, 0, 0);
        position:absolute;
        justify-content:space-between;
        

    }
    #wel{
        font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
        color: #edd67d;
    }

    .right{ background: #ffffff; 
         display: flex;
         align-items: center; 
         justify-content: center; 
         padding: 3rem 2.5rem; }

    .form-box { width: 100%; max-width: 380px; }
    .form-box h1 { font-family: 'DM Serif Display', serif; font-size: 2rem; font-weight: 400; color: #111; margin-bottom: 0.35rem; }
    .form-box .sub { font-size: 0.88rem; color: #777; margin-bottom: 2rem; }
    .form-box .sub a { color: #534ab7; text-decoration: none; font-weight: 500; }
    .form-box .sub a:hover { text-decoration: underline; }

    .field { margin-bottom: 1.1rem; }
    .field label { display: block; font-size: 0.75rem; font-weight: 500; color: #888; margin-bottom: 0.4rem; letter-spacing: 0.6px; text-transform: uppercase; }
    .field input { width: 100%;
         height: 44px;
          border: 1px solid #e2e0da;
           border-radius: 10px; 
           padding: 0 1rem; font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
            color: #111; background: #faf9f7; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
    .field input::placeholder { color: #bbb; }
    .field input:focus { border-color: #7f77dd; 
        box-shadow: 0 0 0 3px rgba(127,119,221,0.15);
         background: #fff; }

    .row{
        display: flex;
        align-items:center ;
        justify-content: space-between;
         margin-top: -0.2rem; margin-bottom: 1.5rem;

    }
    .remember { display: flex; align-items: center; gap: 7px;
        font-size: 14px; color: #666;
        cursor: pointer; user-select: none; }

    .forgot{
        display: flex;
        gap: 7px;
        font-size: 14px;
    }
    .divider{
        display: flex;
        justify-content: center;

    }
    .img{
        height: 100%;
        position: absolute;
        height: 30px;
        
    }
    .btn-login { width: 100%; height: 46px; background: #534ab7; 
        color: #fff; border: none; border-radius: 10px; 
        font-size: 0.95rem; 
        font-family: 'DM Sans', sans-serif;
         font-weight: 500; 
        cursor: pointer; 
        letter-spacing: 0.2px; 
        transition: background 0.15s, transform 0.1s;
        margin-bottom: 1.25rem; }
    .btn-login:hover { background: #3c3489; }
    .btn-login:active { transform: scale(0.98); }



</style>
<body>
    <div class="wrap">
        <div class="left">
            <div class="img"><img  src="image\vecteezy_cloud-computing-modern-flat-concept-for-web-banner-design_5879539.jpg" alt=""></div>
            
            
        </div>

        <div class="right">
            <div class="form-box">
                <h1 style="display: block;">Welcome Back</h1>
                <h6>no account? <a href="">Create one free</a></h6>

                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@company.com" autocomplete="email" />
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
                </div>
                <div class="row">
                    <label class="remember">
                    <input type="checkbox" id="remember" /> Remember me
                    </label>
                    <a class="forgot" href="#">Forgot password?</a>
                </div>
                <button class="btn-login" onclick="handleLogin()">Sign in</button>
                 <div class="divider">
                    <hr /><span>or continue with</span><hr />
                </div>
            </div>

            <h1></h1>

        </div>

        
    </div>
    
</body>
</html>
